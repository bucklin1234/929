<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #000;
  color: #f5f5f7;
  height: 100vh;
  overflow: hidden;
}

/* ── WORDMARK ── */
#wordmark {
  position: fixed;
  top: 28px;
  left: 36px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #f5f5f7;
  z-index: 50;
  opacity: 1;
  transition: opacity 0.4s ease;
}
#wordmark span { font-weight: 200; color: rgba(255,255,255,0.4); margin-left: 6px; font-size: 13px; letter-spacing: 0; }

/* ── CART PILL ── */
#cart-pill {
  position: fixed;
  top: 24px;
  right: 36px;
  z-index: 500;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  color: #f5f5f7;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.25s, opacity 0.4s;
  letter-spacing: 0.01em;
}
#cart-pill:hover { background: rgba(255,255,255,0.18); }
#cart-pill .pill-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  color: #000;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 11px;
  font-weight: 700;
  margin-left: 8px;
}
#cart-pill .pill-count.hidden { display: none; }

/* ── CLOSED RIBBON ── */
#closed-ribbon {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  letter-spacing: 0.05em;
  padding: 8px 20px;
  border-radius: 20px;
  display: none;
  z-index: 50;
}

/* ── STORE ARC ── */
#store {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#store.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

#arc-svg {
  width: min(90vw, 700px);
  height: auto;
  overflow: visible;
}

.seg-hit {
  fill: transparent;
  stroke: none;
  cursor: pointer;
}
.seg-hit:hover ~ .arc-divs .arc-div { stroke: rgba(255,255,255,0.4); }

.arc-outer { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 0.6; pointer-events: none; }
.arc-inner { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 0.5; pointer-events: none; }
.arc-div { stroke: rgba(255,255,255,0.12); stroke-width: 0.5; pointer-events: none; transition: stroke 0.25s; }
.arc-div.active { stroke: rgba(255,255,255,0.5); }

.arc-label {
  font-size: 9.5px;
  fill: rgba(255,255,255,0.38);
  letter-spacing: 0.14em;
  font-weight: 400;
  cursor: pointer;
  transition: fill 0.25s;
  text-transform: uppercase;
}
.arc-label:hover { fill: rgba(255,255,255,0.85); }
.arc-label.active { fill: #fff; font-weight: 600; }

.arc-num {
  font-size: 11px;
  fill: rgba(255,255,255,0.1);
  pointer-events: none;
}

/* Checkout centre */
.checkout-ring {
  fill: none;
  stroke: rgba(255,255,255,0.2);
  stroke-width: 0.8;
  transition: stroke 0.25s;
  cursor: pointer;
}
.checkout-ring:hover { stroke: rgba(255,255,255,0.7); }
.checkout-label {
  fill: rgba(255,255,255,0.4);
  font-size: 7.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  pointer-events: none;
  transition: fill 0.25s;
}
.checkout-sub {
  fill: rgba(255,255,255,0.2);
  font-size: 6.5px;
  letter-spacing: 0.06em;
  pointer-events: none;
}

#station-header {

  color: #0071e3;

  background: none;
  border: none;

}
.back-link:hover { opacity: 0.7; }
.back-link svg { width: 8px; height: 13px; }

.station-name-lg {

  color: #1d1d1f;

.station-tagline {

  color: #6e6e73;
  font-weight: 400;
  letter-spacing: -0.01em;
}

.station-divider {
  height: 1px;

#items-scroll {

}

.items-apple {
  display: grid;

  background: #d2d2d7;
  border: 1px solid #d2d2d7;
}

.item-apple {

  position: relative;

}
.item-apple:hover { background: #f5f5f7; }
.item-apple:active { background: #e8e8ed; }

.ia-name {

  letter-spacing: -0.01em;

.ia-desc {

.ia-foot { display: flex; align-items: center; justify-content: space-between; }
.ia-price {

}
.ia-add:hover { opacity: 0.7; }
.ia-add:disabled { color: #aeaeb2; cursor: default; }

/* Added flash */
.item-apple.adding { background: #e8f4ff; }

#cart-sheet.open { pointer-events: all; }

#cart-backdrop {

}
#cart-sheet.open #cart-backdrop { background: rgba(0,0,0,0.4); }

#cart-inner {

  left: 0; right: 0;
  background: #fff;
  border-radius: 18px 18px 0 0;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);

#cart-sheet.open #cart-inner { transform: translateY(0); }

.cart-handle {

.cs-empty { text-align: center; color: #aeaeb2; font-size: 15px; padding: 48px 0; letter-spacing: -0.01em; }

.cs-item {

.cs-price { font-size: 15px; font-weight: 600; color: #1d1d1f; white-space: nowrap; }

.cart-sheet-foot {

.cs-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }

.cs-total-val { font-size: 22px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; }
.cs-go-btn {

}
.cs-go-btn:hover:not(:disabled) { background: #0077ed; }
.cs-go-btn:disabled { background: #aeaeb2; cursor: default; }

.co-wrap { max-width: 540px; margin: 0 auto; padding: 64px 28px 80px; }

.co-back {

.co-cancel-btn {

  cursor: pointer; font-family: inherit;
  padding: 10px; letter-spacing: -0.01em;

.order-success {

.success-title { font-size: 32px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; margin-bottom: 8px; }
.success-sub { font-size: 17px; color: #6e6e73; margin-bottom: 40px; letter-spacing: -0.01em; line-height: 1.5; }
.success-btn {
  background: #0071e3; color: #fff; border: none;
  border-radius: 12px; padding: 14px 32px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit; letter-spacing: -0.01em;
}
</style>

// ── STATE ─────────────────────────────────────────────────────────────
let cart = [];
let stationOpen = false;

// ── HOURS ─────────────────────────────────────────────────────────────
function isOpen() { const h = new Date().getHours(); return h >= 9 && h < 21; }

// ── SVG BUILD ─────────────────────────────────────────────────────────
const CX=310, CY=315, RO=250, RI=90, N=9;
const rad = d => d*Math.PI/180;
const fx  = n => Math.round(n*10)/10;

function buildArc() {
  const svg = document.getElementById('arc-svg');
  let h = '';

  // Outer arc
  h += `<path class="arc-outer" d="M${CX-RO},${CY} A${RO},${RO} 0 0,0 ${CX+RO},${CY}"/>`;
  // Inner arc
  h += `<path class="arc-inner" d="M${CX-RI},${CY} A${RI},${RI} 0 0,0 ${CX+RI},${CY}"/>`;

  // Divider lines
  for (let i=0;i<=N;i++) {
    const a=rad(180-i*20);
    h += `<line class="arc-div" id="div${i}"
      x1="${fx(CX+RI*Math.cos(a))}" y1="${fx(CY-RI*Math.sin(a))}"
      x2="${fx(CX+RO*Math.cos(a))}" y2="${fx(CY-RO*Math.sin(a))}"/>`;
  }

  // Invisible hit areas + position numbers
  for (let i=0;i<N;i++) {
    const s=rad(180-i*20), e=rad(180-(i+1)*20);
    const x1=CX+RO*Math.cos(s),y1=CY-RO*Math.sin(s);
    const x2=CX+RO*Math.cos(e),y2=CY-RO*Math.sin(e);
    const x3=CX+RI*Math.cos(e),y3=CY-RI*Math.sin(e);
    const x4=CX+RI*Math.cos(s),y4=CY-RI*Math.sin(s);
    const d=`M${fx(x1)},${fx(y1)} A${RO},${RO} 0 0,0 ${fx(x2)},${fx(y2)} L${fx(x3)},${fx(y3)} A${RI},${RI} 0 0,1 ${fx(x4)},${fx(y4)} Z`;
    h += `<path class="seg-hit" id="hit${i}" d="${d}" onclick="openStation(${i})"/>`;

    // Position number
    const a=rad(180-(i+0.5)*20), rm=(RO+RI)/2;
    h += `<text class="arc-num" x="${fx(CX+rm*Math.cos(a))}" y="${fx(CY-rm*Math.sin(a)+4)}" text-anchor="middle" pointer-events="none">${i+1}</text>`;
  }

  // Labels
  const ANCHOR=['end','end','middle','middle','middle','middle','middle','start','start'];
  for (let i=0;i<N;i++) {
    const a=rad(180-(i+0.5)*20), RL=283;
    const lx=CX+RL*Math.cos(a), ly=CY-RL*Math.sin(a);
    const words=STATIONS[i].name.split(' ');
    const anc=ANCHOR[i];
    if (words.length===1) {
      h += `<text class="arc-label" id="lbl${i}" x="${fx(lx)}" y="${fx(ly+4)}"
        text-anchor="${anc}" onclick="openStation(${i})">${words[0]}</text>`;
    } else {
      h += `<text class="arc-label" id="lbl${i}" text-anchor="${anc}" onclick="openStation(${i})">
        <tspan x="${fx(lx)}" y="${fx(ly-3)}">${words[0]}</tspan>
        <tspan x="${fx(lx)}" dy="13">${words[1]}</tspan>
      </text>`;
    }
  }

  // Checkout ring (centre)
  h += `<g onclick="goCheckout()" style="cursor:pointer">
    <circle class="checkout-ring" cx="${CX}" cy="${CY-14}" r="38" id="co-ring"/>
    <text class="checkout-label" x="${CX}" y="${CY-17}" text-anchor="middle">CHECKOUT</text>
    <text class="checkout-sub"   x="${CX}" y="${CY-6}"  text-anchor="middle">tap to pay</text>
  </g>`;

  // Base + entrance
  h += `<line x1="${CX-RI}" y1="${CY}" x2="${CX+RI}" y2="${CY}" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" pointer-events="none"/>`;
  h += `<text x="${CX}" y="${CY+17}" text-anchor="middle" fill="rgba(255,255,255,0.18)" font-size="8" letter-spacing="0.15em" pointer-events="none">ENTRANCE</text>`;

  svg.innerHTML = h;
}

// ── STATION OPEN / CLOSE ──────────────────────────────────────────────
function openStation(i) {
  const st = STATIONS[i];
  document.getElementById('sv-name').textContent = st.name;
  document.getElementById('sv-tag').textContent  = st.tag;
  renderItems(i);
  document.getElementById('station-view').classList.add('open');
  document.getElementById('store').classList.add('hidden');
  stationOpen = true;
}

function closeStation() {
  document.getElementById('station-view').classList.remove('open');
  document.getElementById('store').classList.remove('hidden');
  stationOpen = false;
}

function renderItems(i) {
  const st = STATIONS[i];
  const items = MENU[st.id];
  const open = isOpen();
  document.getElementById('items-apple-grid').innerHTML = items.map(it => `
    <div class="item-apple" onclick="${open ? `addItem(${st.id},'${it.id}','${esc(it.name)}',${it.price},this)` : ''}">
      <div class="ia-name">${it.name}</div>
      <div class="ia-desc">${it.desc}</div>
      <div class="ia-foot">
        <div class="ia-price">$${it.price.toFixed(2)}</div>
        <button class="ia-add" onclick="event.stopPropagation();${open ? `addItem(${st.id},'${it.id}','${esc(it.name)}',${it.price},this.closest('.item-apple'))` : ''}" ${open?'':'disabled'}>
          ${open ? 'Add' : 'Closed'}
        </button>
      </div>
    </div>
  `).join('');
}

function esc(s) { return s.replace(/'/g,"\\'"); }

// ── CART ─────────────────────────────────────────────────────────────
function addItem(stId, itId, name, price, cardEl) {
  const ex = cart.find(c=>c.itId===itId);
  if (ex) { ex.qty++; } else {
    cart.push({stId, itId, name, price, qty:1, stName: STATIONS.find(s=>s.id===stId).name});
  }
  if (cardEl) {
    cardEl.classList.add('adding');
    setTimeout(()=>cardEl.classList.remove('adding'), 350);
  }
  refreshCart();
}

function adjQty(itId, d) {
  const idx = cart.findIndex(c=>c.itId===itId);
  if (idx<0) return;
  cart[idx].qty += d;
  if (cart[idx].qty<=0) cart.splice(idx,1);
  refreshCart();
}

function total() { return cart.reduce((s,c)=>s+c.price*c.qty,0); }
function count() { return cart.reduce((s,c)=>s+c.qty,0); }

function refreshCart() {
  const n = count();
  const pill = document.getElementById('cart-count');
  pill.textContent = n;
  pill.classList.toggle('hidden', n===0);
  document.getElementById('cs-total').textContent = `$${total().toFixed(2)}`;
  document.getElementById('cs-go').disabled = cart.length===0;

  const body = document.getElementById('cart-body');
  if (!cart.length) {
    body.innerHTML = '<div class="cs-empty">Nothing added yet.</div>';
    return;
  }
  body.innerHTML = cart.map(c=>`
    <div class="cs-item">
      <div class="cs-info">
        <div class="cs-name">${c.name}</div>
        <div class="cs-station">${c.stName}</div>
        <div class="cs-qty-row">
          <button class="cs-qb" onclick="adjQty('${c.itId}',-1)">−</button>
          <span class="cs-qv">${c.qty}</span>
          <button class="cs-qb" onclick="adjQty('${c.itId}',1)">+</button>
        </div>
      </div>
      <div class="cs-price">$${(c.price*c.qty).toFixed(2)}</div>
    </div>
  `).join('');
}

function toggleCart() {
  document.getElementById('cart-sheet').classList.toggle('open');
}

// ── CHECKOUT ─────────────────────────────────────────────────────────
function goCheckout() {
  document.getElementById('cart-sheet').classList.remove('open');
  renderCheckout();
  document.getElementById('checkout-view').classList.add('open');
}

function renderCheckout() {
  const wrap = document.getElementById('co-wrap');
  if (!cart.length) {
    wrap.innerHTML = `
      <div class="order-success">
        <div class="success-icon">✓</div>
        <div class="success-title">Order placed.</div>
        <div class="success-sub">Please collect from the checkout<br>counter when your name is called.</div>
        <button class="success-btn" onclick="document.getElementById('checkout-view').classList.remove('open'); cart=[]; refreshCart();">Back to store</button>
      </div>`;
    return;
  }
  const grouped = {};
  cart.forEach(c=>{
    if (!grouped[c.stId]) grouped[c.stId]={name:c.stName,items:[]};
    grouped[c.stId].items.push(c);
  });
  const blocks = Object.values(grouped).map(g=>`
    <div class="co-receipt">
      <div class="co-section-lbl">${g.name}</div>
      ${g.items.map(i=>`
        <div class="co-line">
          <span class="co-line-name">${i.name}<span class="co-line-qty"> × ${i.qty}</span></span>
          <span class="co-line-price">$${(i.price*i.qty).toFixed(2)}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
  wrap.innerHTML = `
    <button class="co-back" onclick="document.getElementById('checkout-view').classList.remove('open')">
      <svg viewBox="0 0 8 13" fill="none" width="8" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 1L1 6.5L7 12" stroke="#0071e3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </button>
    <div class="co-title">Review order</div>
    <div class="co-sub">Takeout · Single collection point</div>
    ${blocks}
    <div class="co-total-card">
      <span class="co-total-lbl">Total</span>
      <span class="co-total-val">$${total().toFixed(2)}</span>
    </div>
    <button class="co-place-btn" onclick="placeOrder()">Place order</button>
    <button class="co-cancel-btn" onclick="document.getElementById('checkout-view').classList.remove('open')">Cancel</button>
  `;
}

function placeOrder() {
  cart = [];
  refreshCart();
  renderCheckout();
}

// ── HOURS GATE ────────────────────────────────────────────────────────
function checkHours() {
  document.getElementById('closed-ribbon').style.display = isOpen() ? 'none' : 'block';
}

// ── INIT ──────────────────────────────────────────────────────────────
buildArc();
checkHours();
refreshCart();
setInterval(checkHours, 60000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>929 Cafe</title>
<style>
:root {
  --bg: #f5f4f0;
  --dark: #1a1a1a;
  --accent: #e8a84c;
  --accent-dk: #c47f1a;
  --white: #fff;
  --border: #e0ddd6;
  --muted: #888;
  --text: #333;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* NAV */
nav {
  background: var(--dark); color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.logo span { color: #fff; font-weight: 300; font-size: 14px; margin-left: 8px; }
.nav-right { display: flex; align-items: center; gap: 4px; }
.nav-link {
  background: none; border: none; color: #aaa; font-size: 14px; cursor: pointer;
  padding: 8px 14px; border-radius: 6px; font-family: inherit; transition: color .2s, background .2s;
}
.nav-link:hover { color: #fff; background: rgba(255,255,255,.1); }
.nav-link.active { color: var(--accent); }
.cart-btn {
  background: var(--accent); border: none; color: var(--dark); font-weight: 700;
  font-size: 13px; padding: 8px 16px; border-radius: 20px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; font-family: inherit;
  margin-left: 8px; transition: background .2s;
}
.cart-btn:hover { background: var(--accent-dk); color: #fff; }
.cart-pill {
  background: var(--dark); color: var(--accent); border-radius: 50%;
  width: 18px; height: 18px; font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}

/* CLOSED BANNER */
#closed-banner {
  display: none; background: #2a1a00; color: var(--accent);
  text-align: center; padding: 9px 24px; font-size: 13px; font-weight: 600;
  letter-spacing: .04em;
}

/* VIEWS */
.view { display: none; }
.view.active { display: block; }
#view-store.active { display: flex; flex-direction: column; align-items: center; }

/* STORE */
.store-wrap { width: 100%; max-width: 700px; padding: 20px 16px 0; }
#store-svg { width: 100%; height: auto; overflow: visible; display: block; }

/* SVG styles */
.seg { cursor: pointer; fill: #fff; stroke: var(--border); stroke-width: 1.5; transition: fill .2s, opacity .2s; }
.seg:hover { fill: #fff8ed; }
.seg.active { fill: var(--accent); stroke: var(--accent-dk); stroke-width: 2; }
.seg.dimmed { fill: #ccc; opacity: .45; cursor: default; pointer-events: none; }
.seg-num { font-size: 13px; font-weight: 800; fill: #bbb; pointer-events: none; transition: fill .2s, opacity .2s; }
.seg-num.active { fill: var(--dark); }
.seg-num.dimmed { opacity: .3; }
.seg-lbl { font-size: 11px; font-weight: 700; fill: #555; pointer-events: none; transition: fill .2s, opacity .2s; }
.seg-lbl.active { fill: var(--accent-dk); }
.seg-lbl.dimmed { fill: #aaa; opacity: .4; }

#checkout-counter { transition: fill .2s; }
g:has(#checkout-counter):hover #checkout-counter { fill: #333; }

/* ITEM PANEL */
#item-panel {
  width: 100%; max-width: 700px; background: var(--white);
  border-top: 3px solid var(--accent);
  max-height: 0; overflow: hidden; transition: max-height .35s ease;
  margin-bottom: 32px;
}
#item-panel.open { max-height: 520px; }
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.panel-name { font-size: 17px; font-weight: 800; }
.panel-close {
  background: none; border: 1px solid var(--border); border-radius: 50%;
  width: 28px; height: 28px; cursor: pointer; font-size: 14px; color: var(--muted);
  display: flex; align-items: center; justify-content: center; transition: border-color .2s;
}
.panel-close:hover { border-color: var(--dark); color: var(--dark); }
.items-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 10px; padding: 14px 20px 20px; max-height: 430px; overflow-y: auto;
}
.item-card {
  border: 1px solid var(--border); border-radius: 8px; padding: 13px;
  background: var(--bg); display: flex; flex-direction: column; gap: 5px;
  transition: border-color .2s, box-shadow .2s;
}
.item-card:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(232,168,76,.15); }
.item-name { font-size: 13px; font-weight: 700; }
.item-desc { font-size: 11px; color: var(--muted); flex: 1; line-height: 1.4; }
.item-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.item-price { font-size: 14px; font-weight: 800; }
.add-btn {
  background: var(--dark); color: var(--accent); border: none; border-radius: 6px;
  padding: 5px 11px; font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: background .2s, color .2s;
}
.add-btn:hover { background: var(--accent); color: var(--dark); }
.add-btn:disabled { background: #ccc; color: #888; cursor: default; }

/* CART OVERLAY */
#cart-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 150;
}
#cart-overlay.open { display: block; }

/* CART PANEL */
#cart-panel {
  position: fixed; top: 56px; right: 0; bottom: 0; width: 320px;
  background: var(--white); border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0,0,0,.12); z-index: 200;
  transform: translateX(100%); transition: transform .3s ease;
  display: flex; flex-direction: column;
}
#cart-panel.open { transform: translateX(0); }
.cart-head {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.cart-title { font-size: 17px; font-weight: 800; }
.cart-x { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
.cart-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
.cart-empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 14px; line-height: 1.6; }
.ci {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.ci:last-child { border-bottom: none; }
.ci-info { flex: 1; }
.ci-name { font-size: 13px; font-weight: 700; }
.ci-station { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.ci-qty { display: flex; align-items: center; gap: 6px; }
.qb {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  width: 22px; height: 22px; font-size: 13px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; line-height: 1;
  transition: border-color .15s;
}
.qb:hover { border-color: var(--accent); }
.qv { font-size: 13px; font-weight: 700; min-width: 16px; text-align: center; }
.ci-price { font-size: 13px; font-weight: 700; white-space: nowrap; }
.cart-foot { padding: 14px 20px; border-top: 1px solid var(--border); }
.cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cart-total-lbl { font-size: 14px; font-weight: 600; }
.cart-total-val { font-size: 18px; font-weight: 800; }
.go-checkout {
  width: 100%; background: var(--dark); color: var(--accent); border: none;
  border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .2s;
}
.go-checkout:hover:not(:disabled) { background: var(--accent); color: var(--dark); }
.go-checkout:disabled { background: #ccc; color: #888; cursor: default; }

/* CHECKOUT */
#view-checkout { max-width: 620px; margin: 0 auto; padding: 32px 24px; }
.co-head { margin-bottom: 24px; }
.co-head h2 { font-size: 24px; font-weight: 800; }
.co-head p { color: var(--muted); font-size: 13px; margin-top: 3px; }
.co-station { margin-bottom: 18px; }
.co-station-name {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); padding-bottom: 5px; border-bottom: 1px solid var(--border); margin-bottom: 6px;
}
.co-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
.co-total {
  border-top: 2px solid var(--dark); padding-top: 14px; margin-top: 14px;
  display: flex; justify-content: space-between; font-size: 19px; font-weight: 800; margin-bottom: 24px;
}
.place-btn {
  display: block; width: 100%; background: var(--dark); color: var(--accent);
  border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: inherit; margin-bottom: 10px; transition: background .2s;
}
.place-btn:hover { background: var(--accent); color: var(--dark); }
.back-btn {
  display: block; width: 100%; background: none; border: 1px solid var(--border);
  border-radius: 10px; padding: 13px; font-size: 14px; cursor: pointer;
  font-family: inherit; color: var(--text); transition: border-color .2s;
}
.back-btn:hover { border-color: var(--dark); }
.order-ok { text-align: center; padding: 60px 24px; }
.order-ok .tick {
  width: 72px; height: 72px; background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin: 0 auto 20px; color: var(--dark);
}
.order-ok h3 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.order-ok p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

/* CONTACTS */
#view-contacts { max-width: 540px; margin: 0 auto; padding: 32px 24px; }
.ct-head { margin-bottom: 28px; }
.ct-head h2 { font-size: 24px; font-weight: 800; }
.ct-head p { color: var(--muted); font-size: 13px; margin-top: 3px; }
.ct-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 12px; }
.ct-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 5px; }
.ct-val { font-size: 15px; font-weight: 600; }
.ct-hours { font-size: 14px; display: flex; justify-content: space-between; }
.ct-hours span:last-child { font-weight: 700; color: #2e7d32; }

/* TOAST */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--dark); color: var(--accent);
  padding: 9px 20px; border-radius: 20px; font-size: 13px; font-weight: 700;
  z-index: 999; transition: transform .25s ease; white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 480px) {
  .items-grid { grid-template-columns: 1fr 1fr; }
  #cart-panel { width: 100%; }
}
</style>
</head>
<body>

<nav>
  <div class="logo">929 <span>Cafe</span></div>
  <div class="nav-right">
    <button class="nav-link active" id="nav-store" onclick="showView('store')">Store</button>
    <button class="nav-link" id="nav-contacts" onclick="showView('contacts')">Contacts</button>
    <button class="cart-btn" onclick="toggleCart()">
      Cart <span class="cart-pill" id="cart-count">0</span>
    </button>
  </div>
</nav>

<div id="closed-banner">We are currently closed &nbsp;·&nbsp; Hours: 9:00 AM – 9:00 PM daily &nbsp;·&nbsp; Menu browsing is available</div>

<div id="view-store" class="view active">
  <div class="store-wrap">
    <svg id="store-svg" viewBox="-55 -25 730 385" xmlns="http://www.w3.org/2000/svg"
         font-family="'Segoe UI', system-ui, sans-serif" overflow="visible"></svg>
  </div>
  <div id="item-panel">
    <div class="panel-head">
      <div class="panel-name" id="panel-title"></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="items-grid" id="items-grid"></div>
  </div>
</div>

<div id="view-checkout" class="view"></div>
<div id="view-contacts" class="view"></div>

<div id="cart-overlay" onclick="toggleCart()"></div>

<div id="cart-panel">
  <div class="cart-head">
    <div class="cart-title">Your Cart</div>
    <button class="cart-x" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-foot">
    <div class="cart-total-row">

      <span class="cart-total-val" id="cart-total">$0.00</span>
    </div>
    <button class="go-checkout" id="go-checkout" onclick="goCheckout()" disabled>Proceed to Checkout</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────
const STATIONS = [
  { id:1, name:'Coffee' },
  { id:2, name:'Sushi' },
  { id:3, name:'Boba' },
  { id:4, name:'Salad' },
  { id:5, name:'Ice Cream' },
  { id:6, name:'Biryani' },
  { id:7, name:'Pizza' },
  { id:8, name:'Juice Centre' },
  { id:9, name:'Cake' },
];

const MENU = {
  1:[
    {id:'c1',name:'Espresso',desc:'Rich double shot, bold and intense',price:3.50},
    {id:'c2',name:'Cappuccino',desc:'Espresso with velvety steamed milk foam',price:4.50},
    {id:'c3',name:'Cold Brew',desc:'12-hour steep, smooth and refreshing',price:4.00},
    {id:'c4',name:'Caramel Latte',desc:'Espresso, steamed milk, house caramel',price:5.00},
    {id:'c5',name:'Mocha',desc:'Espresso with dark chocolate and milk',price:5.00},
  ],
  2:[
    {id:'s1',name:'Salmon Nigiri',desc:'Fresh Atlantic salmon on seasoned rice (2pc)',price:6.50},
    {id:'s2',name:'Tuna Roll',desc:'Bluefin tuna, cucumber, sesame (6pc)',price:8.50},
    {id:'s3',name:'California Roll',desc:'Crab, avocado, cucumber (8pc)',price:7.50},
    {id:'s4',name:'Dragon Roll',desc:'Prawn tempura topped with avocado',price:13.00},
    {id:'s5',name:'Edamame',desc:'Salted soybean pods, sea salt',price:4.00},
  ],
  3:[

    {id:'b2',name:'Taro Milk Tea',desc:'Creamy taro with chewy pearls',price:5.50},
    {id:'b3',name:'Matcha Latte',desc:'Ceremonial grade matcha, oat milk',price:5.50},
    {id:'b4',name:'Mango Fruit Tea',desc:'Tropical mango with green tea base',price:5.00},
    {id:'b5',name:'Strawberry Milk Tea',desc:'Fresh strawberry with classic milk tea',price:5.50},
  ],
  4:[
    {id:'sl1',name:'Caesar Salad',desc:'Romaine, croutons, parmesan, house dressing',price:9.00},
    {id:'sl2',name:'Greek Salad',desc:'Tomato, cucumber, olive, feta, oregano',price:8.50},
    {id:'sl3',name:'Asian Sesame',desc:'Mixed greens, mandarin, sesame ginger dressing',price:9.50},
    {id:'sl4',name:'Quinoa Bowl',desc:'Tri-colour quinoa, roasted veg, tahini',price:10.50},
    {id:'sl5',name:'Caprese',desc:'Buffalo mozzarella, heritage tomato, basil',price:8.00},
  ],
  5:[
    {id:'i1',name:'Vanilla Bean',desc:'Madagascar vanilla, fresh cream',price:3.50},
    {id:'i2',name:'Dark Chocolate',desc:'70% Valrhona chocolate gelato',price:3.50},
    {id:'i3',name:'Strawberry Sorbet',desc:'Fresh strawberry, dairy-free',price:3.50},
    {id:'i4',name:'Mango Sorbet',desc:'Alphonso mango, light and tropical',price:4.00},
    {id:'i5',name:'Matcha Ice Cream',desc:'Uji matcha with white chocolate swirl',price:4.50},
  ],
  6:[
    {id:'br1',name:'Chicken Biryani',desc:'Basmati rice, slow-cooked chicken, saffron',price:13.00},
    {id:'br2',name:'Lamb Biryani',desc:'Tender lamb, whole spices, caramelised onion',price:15.00},
    {id:'br3',name:'Veg Biryani',desc:'Seasonal vegetables, mint, dum-cooked',price:11.00},
    {id:'br4',name:'Prawn Biryani',desc:'Tiger prawns, coastal spice blend',price:16.00},
    {id:'br5',name:'Egg Biryani',desc:'Free-range eggs, golden onion, biryani masala',price:10.00},
  ],
  7:[
    {id:'p1',name:'Margherita',desc:'San Marzano tomato, fresh mozzarella, basil',price:11.00},
    {id:'p2',name:'Pepperoni',desc:'Classic pepperoni, mozzarella, oregano',price:13.00},
    {id:'p3',name:'BBQ Chicken',desc:'Smoky BBQ base, grilled chicken, red onion',price:13.50},
    {id:'p4',name:'Veggie Supreme',desc:'Roasted capsicum, mushroom, olives, artichoke',price:12.00},
    {id:'p5',name:'Four Cheese',desc:'Mozzarella, gorgonzola, pecorino, ricotta',price:13.50},
  ],
  8:[
    {id:'j1',name:'Fresh Orange',desc:'Cold-pressed Valencia oranges',price:4.50},
    {id:'j2',name:'Watermelon Cooler',desc:'Seedless watermelon, mint, lime',price:4.50},
    {id:'j3',name:'Green Detox',desc:'Spinach, cucumber, ginger, green apple',price:5.50},
    {id:'j4',name:'Mango Lassi',desc:'Alphonso mango, yoghurt, cardamom',price:5.00},
    {id:'j5',name:'Berry Smoothie',desc:'Mixed berries, banana, almond milk',price:5.50},
  ],
  9:[
    {id:'ca1',name:'Chocolate Fudge',desc:'Warm flourless chocolate cake, ganache',price:6.50},
    {id:'ca2',name:'Carrot Cake',desc:'Spiced carrot, cream cheese frosting',price:5.50},
    {id:'ca3',name:'Cheesecake',desc:'New York style, berry compote',price:6.00},
    {id:'ca4',name:'Red Velvet',desc:'Moist red velvet, white chocolate cream',price:6.00},
    {id:'ca5',name:'Lemon Tart',desc:'Tangy lemon curd, buttery shortcrust',price:5.50},
  ],
};

// ── STATE ─────────────────────────────────────────────────────────────
let activeIdx = null;
let cart = [];

// ── HOURS ─────────────────────────────────────────────────────────────
function isOpen() {
  const h = new Date().getHours();
  return h >= 9 && h < 21;
}

// ── SVG ───────────────────────────────────────────────────────────────
const CX=310, CY=320, RO=250, RI=90, N=9;
const rad = d => d * Math.PI / 180;
const fx  = n => Math.round(n*10)/10;

function arcPath(i, ro, ri) {
  const s = rad(180 - i*20), e = rad(180 - (i+1)*20);
  const x1=CX+ro*Math.cos(s), y1=CY-ro*Math.sin(s);
  const x2=CX+ro*Math.cos(e), y2=CY-ro*Math.sin(e);
  const x3=CX+ri*Math.cos(e), y3=CY-ri*Math.sin(e);
  const x4=CX+ri*Math.cos(s), y4=CY-ri*Math.sin(s);
  return `M${fx(x1)},${fx(y1)} A${ro},${ro} 0 0,0 ${fx(x2)},${fx(y2)} L${fx(x3)},${fx(y3)} A${ri},${ri} 0 0,1 ${fx(x4)},${fx(y4)} Z`;
}

function buildSVG() {
  const svg = document.getElementById('store-svg');
  let h = '';

  // Outer segments
  for (let i=0;i<N;i++) {
    h += `<path class="seg" id="seg${i}" d="${arcPath(i,RO,RI)}" onclick="selectSeg(${i})"/>`;
  }

  // Divider lines
  for (let i=0;i<=N;i++) {
    const a=rad(180-i*20);
    const x1=CX+RI*Math.cos(a), y1=CY-RI*Math.sin(a);
    const x2=CX+RO*Math.cos(a), y2=CY-RO*Math.sin(a);
    h += `<line x1="${fx(x1)}" y1="${fx(y1)}" x2="${fx(x2)}" y2="${fx(y2)}" stroke="#e0ddd6" stroke-width="1.2" pointer-events="none"/>`;
  }

  // Position numbers inside segments
  for (let i=0;i<N;i++) {
    const a=rad(180-(i+0.5)*20);
    const rm=(RO+RI)/2;
    const nx=CX+rm*Math.cos(a), ny=CY-rm*Math.sin(a);
    h += `<text class="seg-num" id="num${i}" x="${fx(nx)}" y="${fx(ny+5)}" text-anchor="middle" pointer-events="none">${i+1}</text>`;
  }

  // Labels outside arc
  const ANCHORS = ['end','end','middle','middle','middle','middle','middle','start','start'];
  for (let i=0;i<N;i++) {
    const a = rad(180-(i+0.5)*20);
    const RL=283;
    const lx=CX+RL*Math.cos(a), ly=CY-RL*Math.sin(a);
    const words = STATIONS[i].name.split(' ');
    const anc = ANCHORS[i];
    if (words.length===1) {
      h += `<text class="seg-lbl" id="lbl${i}" x="${fx(lx)}" y="${fx(ly+4)}" text-anchor="${anc}">${words[0]}</text>`;
    } else {
      h += `<text class="seg-lbl" id="lbl${i}" text-anchor="${anc}">
        <tspan x="${fx(lx)}" y="${fx(ly-3)}">${words[0]}</tspan>
        <tspan x="${fx(lx)}" dy="13">${words[1]}</tspan>
      </text>`;
    }
  }

  // Checkout counter (central, clickable)
  h += `<g onclick="goCheckout()" style="cursor:pointer">
    <ellipse cx="${CX}" cy="${CY-16}" rx="54" ry="27" fill="#1a1a1a" id="checkout-counter"/>
    <text x="${CX}" y="${CY-18}" text-anchor="middle" fill="#e8a84c" font-size="8" font-weight="700" letter-spacing="0.1em">CHECKOUT</text>
    <text x="${CX}" y="${CY-6}" text-anchor="middle" fill="#666" font-size="7.5" letter-spacing="0.04em">tap to pay</text>
  </g>`;

  // Base line + entrance
  h += `<line x1="${CX-RI}" y1="${CY}" x2="${CX+RI}" y2="${CY}" stroke="#1a1a1a" stroke-width="2" pointer-events="none"/>`;
  h += `<text x="${CX}" y="${CY+17}" text-anchor="middle" fill="#888" font-size="9" font-weight="700" letter-spacing="0.12em" pointer-events="none">ENTRANCE</text>`;

  svg.innerHTML = h;
}

// ── SEGMENT INTERACTION ───────────────────────────────────────────────
function selectSeg(i) {
  if (activeIdx === i) { closePanel(); return; }
  activeIdx = i;
  updateArc();
  renderPanel(i);
}

function closePanel() {
  activeIdx = null;
  updateArc();
  document.getElementById('item-panel').classList.remove('open');
}

function updateArc() {
  for (let i=0;i<N;i++) {
    const seg=document.getElementById(`seg${i}`);
    const num=document.getElementById(`num${i}`);
    const lbl=document.getElementById(`lbl${i}`);
    seg.className.baseVal = 'seg' + (activeIdx===null ? '' : i===activeIdx ? ' active' : ' dimmed');
    if (num) num.className.baseVal = 'seg-num' + (activeIdx===null ? '' : i===activeIdx ? ' active' : ' dimmed');
    if (lbl) lbl.className.baseVal = 'seg-lbl' + (activeIdx===null ? '' : i===activeIdx ? ' active' : ' dimmed');
  }
}

function renderPanel(i) {
  const st = STATIONS[i];
  const items = MENU[st.id];
  const open = isOpen();
  document.getElementById('panel-title').textContent = st.name;
  document.getElementById('items-grid').innerHTML = items.map(it => `
    <div class="item-card">
      <div class="item-name">${it.name}</div>
      <div class="item-desc">${it.desc}</div>
      <div class="item-foot">
        <div class="item-price">$${it.price.toFixed(2)}</div>
        <button class="add-btn" onclick="addItem(${st.id},'${it.id}','${esc(it.name)}',${it.price})" ${open?'':'disabled'}>
          ${open ? '+ Add' : 'Closed'}
        </button>
      </div>
    </div>
  `).join('');
  document.getElementById('item-panel').classList.add('open');
}

function esc(s){ return s.replace(/'/g,"\\'"); }

// ── CART ─────────────────────────────────────────────────────────────
function addItem(stId, itId, name, price) {
  const ex = cart.find(c=>c.itId===itId);
  if (ex) { ex.qty++; } else {
    const st = STATIONS.find(s=>s.id===stId);
    cart.push({stId, itId, name, price, qty:1, stName:st.name});
  }
  refreshCart();
  toast(`${name} added`);
}

function adjQty(itId, d) {
  const idx = cart.findIndex(c=>c.itId===itId);
  if (idx<0) return;
  cart[idx].qty += d;
  if (cart[idx].qty<=0) cart.splice(idx,1);
  refreshCart();
}

function total() { return cart.reduce((s,c)=>s+c.price*c.qty,0); }
function count() { return cart.reduce((s,c)=>s+c.qty,0); }

function refreshCart() {
  const n = count();
  document.getElementById('cart-count').textContent = n;
  document.getElementById('cart-total').textContent = `$${total().toFixed(2)}`;
  document.getElementById('go-checkout').disabled = cart.length===0;
  const body = document.getElementById('cart-body');
  if (!cart.length) {
    body.innerHTML = '<div class="cart-empty">Your cart is empty.<br>Browse any station to add items.</div>';
    return;
  }
  body.innerHTML = cart.map(c=>`
    <div class="ci">
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-station">${c.stName}</div>
        <div class="ci-qty">
          <button class="qb" onclick="adjQty('${c.itId}',-1)">−</button>
          <span class="qv">${c.qty}</span>
          <button class="qb" onclick="adjQty('${c.itId}',1)">+</button>
        </div>
      </div>
      <div class="ci-price">$${(c.price*c.qty).toFixed(2)}</div>
    </div>
  `).join('');
}

function toggleCart() {
  document.getElementById('cart-panel').classList.toggle('open');
  document.getElementById('cart-overlay').classList.toggle('open');
}

// ── CHECKOUT ─────────────────────────────────────────────────────────
function goCheckout() {
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
  closePanel();
  showView('checkout');
}

function renderCheckout() {
  const el = document.getElementById('view-checkout');
  if (!cart.length) {
    el.innerHTML = `
      <div class="order-ok">
        <div class="tick">✓</div>
        <h3>Order Placed!</h3>
        <p>Your order has been received.<br>Please collect from the counter.</p>
        <button class="place-btn" onclick="showView('store')">Back to Store</button>
      </div>`;
    return;
  }
  const grouped = {};
  cart.forEach(c => {
    if (!grouped[c.stId]) grouped[c.stId]={name:c.stName,items:[]};
    grouped[c.stId].items.push(c);
  });
  const blocks = Object.values(grouped).map(g=>`
    <div class="co-station">
      <div class="co-station-name">${g.name}</div>
      ${g.items.map(i=>`<div class="co-row"><span>${i.name} × ${i.qty}</span><span>$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}
    </div>
  `).join('');
  el.innerHTML = `
    <div class="co-head"><h2>Your Order</h2><p>Review before placing</p></div>
    ${blocks}
    <div class="co-total"><span>Total</span><span>$${total().toFixed(2)}</span></div>
    <button class="place-btn" onclick="placeOrder()">Place Order</button>
    <button class="back-btn" onclick="showView('store')">Continue Browsing</button>
  `;
}

function placeOrder() {
  cart = [];
  refreshCart();
  renderCheckout();
}

// ── CONTACTS ─────────────────────────────────────────────────────────
function renderContacts() {
  document.getElementById('view-contacts').innerHTML = `
    <div class="ct-head"><h2>Contact Us</h2><p>Get in touch</p></div>
    <div class="ct-card"><div class="ct-lbl">Store</div><div class="ct-val">929 Cafe</div></div>
    <div class="ct-card">
      <div class="ct-lbl">Operating Hours</div>
      <div class="ct-hours"><span>Monday – Sunday</span><span>9:00 AM – 9:00 PM</span></div>
    </div>
    <div class="ct-card"><div class="ct-lbl">Email</div><div class="ct-val">hello@929cafe.com</div></div>
    <div class="ct-card"><div class="ct-lbl">Phone</div><div class="ct-val">TBC</div></div>
    <div class="ct-card"><div class="ct-lbl">Address</div><div class="ct-val">TBC</div></div>
  `;
}

// ── VIEWS ─────────────────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  const nl = document.getElementById(`nav-${v}`);
  if (nl) nl.classList.add('active');
  if (v==='checkout') renderCheckout();
  if (v==='contacts') renderContacts();
}

// ── TOAST ─────────────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(()=>el.classList.remove('show'), 1800);
}

// ── HOURS GATE ────────────────────────────────────────────────────────
function checkHours() {
  document.getElementById('closed-banner').style.display = isOpen() ? 'none' : 'block';
}

// ── INIT ──────────────────────────────────────────────────────────────
buildSVG();
checkHours();
refreshCart();
setInterval(checkHours, 60000);
</script>
</body>
</html>
